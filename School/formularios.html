<body>
    <form action="#">
        <h1> Tipos de Inputs HML5</h1>
        <fieldset>
            <legend>Identificação de Acesso</legend>
            <div class = "row"> 
        
            </div class="campo">
            <label for="nome">Nome:</label>
            <input type="text" name = "nome" id="" placeholder="Nome Completo" required>
            <div>
                <div class = "campo">
                    <label for="senha" Senha(password)></label>
                <input type="password" name = "senha" id = " " required> 
            </div>
            <div Class = "Campo">
                <label for="email" > E-mail (email)</label>
                <input type="email" name=" email" id="" placeholder="seu@email=" seu@email.com.br>
            </div>
            </div>
        </fieldset>
        <fieldset>
            <legend>Dados Quantitativos</legend>
            <div class="row">
                <div class="campo">
                    <label for="idade">Idade (number)</label>
                    <input type="number" name="idade" id="" min="18" max="100" value="18">
                </div>
                <div class="campo">
                    <label for="volume">Volume (range)</label>
                    <input type="range" name="volume" id="" min="0" max="100">
                </div>
                 <div class="campo">
                    <label for="cor">Tema de cor (color)</label>
                    <input type="color" name="cor_tema" id="" value="#2498db">
                </div>
            </div>
        </fieldset>
