<!DOCTYPE html>
<html>

<!--Aula 08 Manipulando Dimensões-->

<head>

    <title>Lists</title>
    <meta charset="utf-8" />
    <link href="css/styleAula08.css" rel="stylesheet" />

</head>

<body>
    <!--Lista 1-->
    <ul class="lista">
        <li>Produto 1</li>
        <li>Produto 2</li>
        <li class="item3">Produto 3</li>
        <li>Produto 4</li>
    </ul>

    <!--Lista 2-->
    <ul class="lista2">
        <li>Produto 1</li>
        <li>Produto 2</li>
        <li class="item3">Produto 3</li>
        <li>Produto 4</li>
    </ul>

    <!--Lista 3-->
    <ol>
        <li>Produto 1
            <ol>
                <li>Sub item</li>
                <li>Sub item</li>
            </ol>
        </li>
        <li>Produto 2</li>
        <li>Produto 3</li>
        <li>Produto 4</li>
    </ol>

    <!--Exemplo 4-->
    <div class="uno">
        <div class="dos">
        </div><!--DOS-->
        <div class="tres">
            <div class="cuatro"></div>
        </div><!--TRES-->
    </div>


</body>

</html>
