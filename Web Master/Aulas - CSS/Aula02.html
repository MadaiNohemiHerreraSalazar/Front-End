<!DOCTYPE html>
<html>

<!--Aula 02 Estilos externos, IDs e classes-->

<head>

    <title>CSS!</title>
    <meta charset="utf-8" />
    <link href="css/styleAula02.css" type="text/css" rel="stylesheet" />

</head>

<body>

    <!--
    IDs não podem ser repetidas!!
    Classes sim!
    -->

    <div id="div1" class="div1">
        <h1>Title 1</h1>
    </div>

    <div id="div2" class="div2">
        <h1>Title 2</h1>
    </div>
    
</body>

</html>
